<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any Website - With TPH Chatbot</title>
  <link rel="stylesheet" href="chatbot-widget.css">
  <style>
    /* This is your existing website's CSS - the chatbot doesn't interfere */
    body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background: #f5f5f5; }
    h1 { color: #333; }
    p { color: #666; max-width: 600px; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- Your existing website content -->
  <h1>Welcome to My Website</h1>
  <p>This is a demo showing how the TPH Chatbot Widget works on any website.
     Just add the CSS and JS files, and the chatbot appears automatically in the bottom-right corner.</p>
  <p>Click the character in the bottom-right to open the chat!</p>

  <!-- Just add this one script before closing body tag -->
  <script src="chatbot-widget.js"></script>
</body>
</html>
